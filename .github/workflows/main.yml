name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.el'
      - '**/*.org'
      - '.github/workflows/**'
  pull_request:
    branches: [main]
    paths:
      - '**/*.el'
      - '**/*.org'
      - '.github/workflows/**'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Linux (representative of Linux Mint) ─────────────────
  linux:
    name: Linux
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: purcell/setup-emacs@master
        with:
          version: 30.1

      - name: Emacs version
        run: emacs --version | head -1

      - name: Link as ~/.emacs.d
        run: |
          rm -rf "$HOME/.emacs.d"
          ln -s "$GITHUB_WORKSPACE" "$HOME/.emacs.d"

      - name: Syntax check all .el files
        run: |
          errors=0
          count=0
          for f in $(find . -name '*.el' \
              -not -path './elpaca/*' \
              -not -path './elpa/*' \
              -not -path './.git/*' \
              -not -path './site-lisp/nano-elfeed/*' \
              -not -path './site-lisp/target/*' \
              -not -path './clomacs/*'); do
            count=$((count + 1))
            if ! emacs --batch --eval "
              (condition-case err
                  (with-temp-buffer
                    (insert-file-contents \"$f\")
                    (goto-char (point-min))
                    (condition-case nil
                        (while t (read (current-buffer)))
                      (end-of-file nil)))
                (error
                 (message \"SYNTAX ERROR in %s: %S\" \"$f\" err)
                 (kill-emacs 1)))" 2>&1; then
              echo "::error file=${f#./}::Elisp syntax error"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $count files, $errors error(s)"
          [ "$errors" -eq 0 ]

      - name: Install leaf for byte-compilation
        run: |
          LEAF_DIR="/tmp/leaf-packages"
          echo "LEAF_DIR=$LEAF_DIR" >> "$GITHUB_ENV"
          emacs --batch --eval "
            (progn
              (require (quote package))
              (setq package-user-dir \"$LEAF_DIR\")
              (add-to-list (quote package-archives)
                           (quote (\"melpa\" . \"https://melpa.org/packages/\")) t)
              (package-initialize)
              (package-refresh-contents)
              (package-install (quote leaf))
              (package-install (quote leaf-keywords)))"

      - name: Byte-compile modules (informational)
        continue-on-error: true
        run: |
          # Build load-path from elpaca builds (if cached)
          ELPACA_LOAD=""
          if [ -d "elpaca/builds" ]; then
            for dir in elpaca/builds/*/; do
              [ -d "$dir" ] || continue
              abs="$(cd "$dir" && pwd)"
              ELPACA_LOAD="$ELPACA_LOAD (add-to-list (quote load-path) \"$abs\")"
            done
          fi

          errors=0
          for f in modules/*.el modules/lang/*.el site-lisp/k-*.el; do
            [ -f "$f" ] || continue
            if ! emacs --batch \
              --eval "(progn
                (require (quote package))
                (setq package-user-dir \"$LEAF_DIR\")
                (package-initialize)
                (add-to-list (quote load-path) \"$(pwd)/modules\")
                (add-to-list (quote load-path) \"$(pwd)/modules/lang\")
                (add-to-list (quote load-path) \"$(pwd)/site-lisp\")
                $ELPACA_LOAD
                (require (quote leaf))
                (require (quote leaf-keywords))
                (leaf-keywords-init)
                (setq byte-compile-warnings
                      (quote (not free-vars unresolved noruntime cl-functions))))" \
              -f batch-byte-compile "$f" 2>&1; then
              echo "::error file=$f::Byte-compile error"
              errors=$((errors + 1))
            fi
          done
          # Clean up .elc files
          find . -name '*.elc' -not -path './elpaca/*' -delete 2>/dev/null || true
          echo "Byte-compile: $errors error(s)"
          [ "$errors" -eq 0 ]

      - name: Cache elpaca packages
        uses: actions/cache@v4
        with:
          path: elpaca
          key: elpaca-linux-30.1-${{ hashFiles('modules/k-leaf.el') }}
          restore-keys: elpaca-linux-

      - name: Load full configuration (best-effort)
        continue-on-error: true
        run: |
          timeout 300 emacs --batch \
            --eval "(setq debug-on-error t)" \
            -l "$HOME/.emacs.d/early-init.el" 2>&1
          echo "Configuration loaded successfully"

  # ── Windows ──────────────────────────────────────────────
  windows:
    name: Windows
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install Emacs
        shell: powershell
        run: choco install emacs -y --no-progress

      - name: Set HOME for Emacs
        shell: cmd
        run: |
          echo HOME=%USERPROFILE%>>"%GITHUB_ENV%"

      - name: Emacs version
        shell: bash
        run: emacs --version | head -1

      - name: Link as ~/.emacs.d
        shell: cmd
        run: |
          if exist "%USERPROFILE%\.emacs.d" rmdir /s /q "%USERPROFILE%\.emacs.d"
          mklink /J "%USERPROFILE%\.emacs.d" "%GITHUB_WORKSPACE%"

      - name: Syntax check all .el files
        shell: bash
        run: |
          errors=0
          count=0
          for f in $(find . -name '*.el' \
              -not -path './elpaca/*' \
              -not -path './elpa/*' \
              -not -path './.git/*' \
              -not -path './site-lisp/nano-elfeed/*' \
              -not -path './site-lisp/target/*' \
              -not -path './clomacs/*'); do
            count=$((count + 1))
            if ! emacs --batch --eval "
              (condition-case err
                  (with-temp-buffer
                    (insert-file-contents \"$f\")
                    (goto-char (point-min))
                    (condition-case nil
                        (while t (read (current-buffer)))
                      (end-of-file nil)))
                (error
                 (message \"SYNTAX ERROR in %s: %S\" \"$f\" err)
                 (kill-emacs 1)))" 2>&1; then
              echo "::error file=${f#./}::Elisp syntax error"
              errors=$((errors + 1))
            fi
          done
          echo "Checked $count files, $errors error(s)"
          [ "$errors" -eq 0 ]

      - name: Cache elpaca packages
        uses: actions/cache@v4
        with:
          path: elpaca
          key: elpaca-windows-30.1-${{ hashFiles('modules/k-leaf.el') }}
          restore-keys: elpaca-windows-

      - name: Load full configuration (best-effort)
        continue-on-error: true
        shell: cmd
        run: |
          emacs --batch ^
            --eval "(setq debug-on-error t)" ^
            -l "%USERPROFILE%\.emacs.d\early-init.el" 2>&1
          echo Configuration loaded successfully

  # ── GNU Guix ─────────────────────────────────────────────
  guix:
    name: GNU Guix
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Install GNU Guix
        run: |
          # Install Guix via official binary tarball
          GUIX_VERSION=1.4.0
          cd /tmp
          wget -q "https://ftp.gnu.org/gnu/guix/guix-binary-${GUIX_VERSION}.x86_64-linux.tar.xz"
          sudo tar -C / --warning=no-timestamp -xf "guix-binary-${GUIX_VERSION}.x86_64-linux.tar.xz"
          sudo ln -sf /var/guix/profiles/per-user/root/current-guix/bin/guix /usr/local/bin/guix

          # Create build users
          sudo groupadd --system guixbuild 2>/dev/null || true
          for i in $(seq -w 1 10); do
            sudo useradd -g guixbuild -G guixbuild \
              -d /var/empty -s "$(which nologin)" \
              -c "Guix build user $i" --system "guixbuilder${i}" 2>/dev/null || true
          done

          # Authorize substitutes
          sudo mkdir -p /etc/guix
          sudo guix archive --authorize < /var/guix/profiles/per-user/root/current-guix/share/guix/ci.guix.gnu.org.pub

          # Start daemon
          sudo /var/guix/profiles/per-user/root/current-guix/bin/guix-daemon \
            --build-users-group=guixbuild &
          sleep 3

      - name: Link as ~/.emacs.d
        run: |
          rm -rf "$HOME/.emacs.d"
          ln -s "$GITHUB_WORKSPACE" "$HOME/.emacs.d"

      - name: Guix Emacs version
        run: guix shell emacs git coreutils -- emacs --version | head -1

      - name: Syntax check all .el files
        run: |
          cat > /tmp/syntax-check.sh << 'SCRIPT'
          #!/usr/bin/env bash
          cd "$1"
          errors=0
          count=0
          for f in $(find . -name '*.el' \
              -not -path './elpaca/*' \
              -not -path './elpa/*' \
              -not -path './.git/*' \
              -not -path './site-lisp/nano-elfeed/*' \
              -not -path './site-lisp/target/*' \
              -not -path './clomacs/*'); do
            count=$((count + 1))
            if ! emacs --batch --eval "
              (condition-case err
                  (with-temp-buffer
                    (insert-file-contents \"$f\")
                    (goto-char (point-min))
                    (condition-case nil
                        (while t (read (current-buffer)))
                      (end-of-file nil)))
                (error
                 (message \"SYNTAX ERROR in %s: %S\" \"$f\" err)
                 (kill-emacs 1)))" 2>&1; then
              errors=$((errors + 1))
            fi
          done
          echo "Checked $count files, $errors error(s)"
          [ "$errors" -eq 0 ]
          SCRIPT
          chmod +x /tmp/syntax-check.sh
          guix shell emacs git coreutils -- bash /tmp/syntax-check.sh "$GITHUB_WORKSPACE"

      - name: Cache elpaca packages
        uses: actions/cache@v4
        with:
          path: elpaca
          key: elpaca-guix-${{ hashFiles('modules/k-leaf.el') }}
          restore-keys: elpaca-guix-

      - name: Load full configuration (best-effort)
        continue-on-error: true
        run: |
          timeout 300 guix shell emacs git coreutils -- emacs --batch \
            --eval "(setq debug-on-error t)" \
            -l "$HOME/.emacs.d/early-init.el" 2>&1
          echo "Configuration loaded successfully"
